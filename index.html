<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小明的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            color: #4facfe;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.1);
        }

        .name {
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .content {
            padding: 30px;
        }

        .info-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            font-size: 18px;
        }

        .info-text {
            flex: 1;
        }

        .info-label {
            color: #999;
            font-size: 12px;
            margin-bottom: 3px;
        }

        .info-value {
            color: #333;
            font-size: 16px;
            font-weight: 500;
        }

        .section-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: inline-block;
        }

        .hobbies {
            margin-top: 25px;
        }

        .hobby-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            transition: transform 0.3s ease;
        }

        .tag:hover {
            transform: scale(1.05);
        }

        .photo-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .photo-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(240, 147, 251, 0.4);
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f9f9f9;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <!-- 点击头像跳转到照片页面 -->
            <a href="jpg.html" target="_blank">
                <div class="avatar">
                    <img src="jpg/papadog.jpg" alt="头像" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                </div>
            </a>
            <h1 class="name">小明</h1>
        </div>
        
        <div class="content">
            <div class="info-item">
                <div class="icon">👨</div>
                <div class="info-text">
                    <div class="info-label">性别</div>
                    <div class="info-value">男</div>
                </div>
            </div>
            
            <div class="info-item">
                <div class="icon">🎂</div>
                <div class="info-text">
                    <div class="info-label">年龄</div>
                    <div class="info-value">1998年8月出生（27岁）</div>
                </div>
            </div>
            
            <div class="info-item">
                <div class="icon">📍</div>
                <div class="info-text">
                    <div class="info-label">居住城市</div>
                    <div class="info-value">上海</div>
                </div>
            </div>

            <div class="hobbies">
                <h3 class="section-title">兴趣爱好</h3>
                <div class="hobby-tags">
                    <span class="tag">📚 看小说</span>
                    <span class="tag">📺 追剧</span>
                    <span class="tag">🎮 打游戏</span>
                    <span class="tag">🏞️ 周末打卡</span>
                </div>
            </div>

            <!-- 添加照片展示入口 -->
            <a href="jpg.html" class="photo-link" target="_blank">
                📸 点击查看我的照片集
            </a>
        </div>
        
        <div class="footer">
            欢迎来到我的个人主页 ✨
        </div>
    </div>
</body>
</html>
